name: pr-ci
on:
  pull_request:
    types: [opened, reopened, edited, synchronize]
    paths-ignore:
    - "**/*.md"
    - "**/*.gitignore"
    - "**/*.gitattributes"

jobs:
  Run-Lint:
    runs-on: ubuntu-latest
    env:
      github-token: '${{ secrets.GH_Packages }}'
    steps:
      - name: Step-01 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Step-02 Lint Code Base
        uses: github/super-linter@v4
        env:
          VALIDATE_ALL_CODEBASE: false
          FILTER_REGEX_INCLUDE: .*src/.*
          DEFAULT_BRANCH: master
          GITHUB_TOKEN: '${{ env.github-token }}'
  
  Build-Test:
    runs-on: ubuntu-latest
    outputs:
      nuGetVersion: ${{ steps.gitversion.outputs.NuGetVersion }}
      majorMinorPatch: ${{ steps.gitversion.outputs.MajorMinorPatch }}
      fullSemVer: ${{ steps.gitversion.outputs.FullSemVer }}
      branchName: ${{ steps.gitversion.outputs.BranchName }}
    env:
      working-directory: ${{ github.workspace }}

    steps:
      - name: Step-01 Install GitVersion
        uses: gittools/actions/gitversion/setup@v0.9.15
        with:
          versionSpec: 5.x

      - name: Step-02 Check out Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Step-03 Calculate Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v0.9.15
        with:
          useConfigFile: true

      - name: Step-04 Display Version Info
        run: |
          echo "NuGetVersion: ${{ steps.gitversion.outputs.NuGetVersion }}"
          echo "FullSemVer: ${{ steps.gitversion.outputs.FullSemVer }}"
          echo "BranchName: ${{ steps.gitversion.outputs.BranchName }}"

      - name: Step-05 Install .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 9.0.x

      - name: Step-06 Restore dependencies
        run: dotnet restore
        working-directory: '${{ env.working-directory }}'

      - name: Step-07 Build Version (Beta)
        run: dotnet build --configuration Release --no-restore -p:PackageVersion=${{ steps.gitversion.outputs.NuGetVersion }}
        working-directory: '${{ env.working-directory }}'

      - name: Step-08 Run Unit Tests
        run: dotnet test --configuration Release --no-build --no-restore --verbosity normal --filter "Category=Unit"
        working-directory: '${{ env.working-directory }}'

      - name: Step-09 Start LocalStack Container
        run: |
          docker run -d \
            --name localstack \
            -p 4566:4566 \
            -e SERVICES=sqs,sns,kms,iam \
            -e DEBUG=1 \
            -e DOCKER_HOST=unix:///var/run/docker.sock \
            localstack/localstack:latest
          
          # Wait for LocalStack to be ready (max 60 seconds)
          echo "Waiting for LocalStack to be ready..."
          timeout 60 bash -c 'until docker exec localstack curl -s http://localhost:4566/_localstack/health | grep -q "\"sqs\": \"available\""; do sleep 2; done' || echo "LocalStack startup timeout"
          
          # Display LocalStack health status
          docker exec localstack curl -s http://localhost:4566/_localstack/health

      - name: Step-10 Configure AWS SDK for LocalStack
        run: |
          echo "AWS_ACCESS_KEY_ID=test" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=test" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV
          echo "AWS_ENDPOINT_URL=http://localhost:4566" >> $GITHUB_ENV

      - name: Step-11 Run Integration Tests with LocalStack
        run: dotnet test --configuration Release --no-build --no-restore --verbosity normal --filter "Category=Integration&Category=RequiresLocalStack"
        working-directory: '${{ env.working-directory }}'
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566

      - name: Step-12 Stop LocalStack Container
        if: always()
        run: |
          docker stop localstack || true
          docker rm localstack || true

      - name: Step-13 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: ${{ env.working-directory }}
          retention-days: 1